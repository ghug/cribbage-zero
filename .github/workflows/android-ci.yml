name: Android CI (signed dev build)

# Builds the APK — crucially the NDK build of the native engine (libczactor.so) — on every push that
# touches the Android app or the C++ core, so native build breaks surface immediately (they can't be caught
# in the dev sandbox, which has no Android SDK/NDK). It SIGNS the APK with the same release keystore as
# android-release.yml, so the dev build installs without the Play Protect "unknown developer" block that
# the debug keystore (CN=Android Debug) trips. The formal GitHub Release is still only cut on a version tag.

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'android/**'
      - 'core/**'
      - 'third_party/**'
      - 'engine/build-bundle.sh'
      - '.github/workflows/android-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (for the engine bundle)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pinned NDK + CMake
        run: sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Stamp the dev version (honest versionName + distinct versionCode)
        run: |
          set -euo pipefail
          DEV=$(grep CZ_VERSION settings.js | grep -oE '"[^"]*"' | tr -d '"')   # e.g. 0.1.37-dev.5 (from settings.js)
          SHA=$(git rev-parse --short HEAD)
          BASE_VC=$(grep -oE 'versionCode [0-9]+' android/app/build.gradle | grep -oE '[0-9]+')
          DEV_VC=$((BASE_VC + 1))   # next release's code: > the last release, == the eventual v-next (reinstalls cleanly)
          sed -i "s/versionName \"[^\"]*\"/versionName \"${DEV}+${SHA}\"/" android/app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${DEV_VC}/" android/app/build.gradle
          echo "dev build stamped: versionName ${DEV}+${SHA}, versionCode ${DEV_VC}"

      - name: Build release APK (unsigned, incl. the NDK engine)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Sign with the release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          OUT="cribbage-zero-worker-dev.apk"
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::warning::No signing secrets — uploading the UNSIGNED release APK (Play Protect will block it). Set KEYSTORE_* secrets to get a signed dev build."
            cp "$UNSIGNED" "$OUT"
          else
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            BT="$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -1)"
            "$BT/zipalign" -p -f 4 "$UNSIGNED" "$RUNNER_TEMP/aligned.apk"
            "$BT/apksigner" sign \
              --ks "$RUNNER_TEMP/release.jks" \
              --ks-type pkcs12 \
              --ks-pass env:KEYSTORE_PASSWORD \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass env:KEY_PASSWORD \
              --out "$OUT" "$RUNNER_TEMP/aligned.apk"
            "$BT/apksigner" verify --print-certs "$OUT"
          fi

      - name: Upload signed dev APK
        uses: actions/upload-artifact@v4
        with:
          name: cribbage-zero-worker-dev
          path: cribbage-zero-worker-dev.apk
          if-no-files-found: error
