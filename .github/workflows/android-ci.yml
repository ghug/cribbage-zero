name: Android CI (debug build)

# Compiles the APK — crucially the NDK build of the native engine (libczactor.so) — on every push that
# touches the Android app or the C++ core, so native build breaks surface immediately (they can't be caught
# in the dev sandbox, which has no Android SDK/NDK). Uploads the unsigned debug APK as an artifact to test
# on a device. The signed RELEASE APK is still built only on a version tag by android-release.yml.

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'android/**'
      - 'core/**'
      - 'third_party/**'
      - 'engine/build-bundle.sh'
      - '.github/workflows/android-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (for the engine bundle)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pinned NDK + CMake
        run: sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Build debug APK (incl. the NDK engine)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cribbage-zero-worker-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
