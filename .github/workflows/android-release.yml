name: Worker APK Release

# Builds a signed Cribbage Zero Worker APK and attaches it to a GitHub Release on a version tag.
# One-time keystore + secrets setup mirrors the companion project (KEYSTORE_BASE64 / KEYSTORE_PASSWORD
# / KEY_ALIAS / KEY_PASSWORD). The worker page also runs in any phone browser, so the APK is optional.

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  release:
    types: [published]   # creating a Release in the GitHub web UI also triggers a build
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (for the engine bundle)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pinned NDK + CMake (for the native engine)
        run: sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Build release APK (unsigned)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease     # runs engine/build-bundle.sh + stages worker.html

      - name: Sign APK
        id: sign
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::error::Signing secrets missing (KEYSTORE_BASE64/KEYSTORE_PASSWORD/KEY_ALIAS/KEY_PASSWORD)."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          BT="$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -1)"
          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          OUT="cribbage-zero-worker-${GITHUB_REF_NAME}.apk"
          "$BT/zipalign" -p -f 4 "$UNSIGNED" "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-type pkcs12 \
            --ks-pass env:KEYSTORE_PASSWORD \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass env:KEY_PASSWORD \
            --out "$OUT" "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" verify --print-certs "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Publish APK to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign.outputs.apk }}
          fail_on_unmatched_files: true
